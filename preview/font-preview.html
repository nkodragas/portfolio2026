<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Font Preview - Fixed</title>
    <style>
        @font-face {
            font-family: 'BrutalistGrotesk';
            src: url('BrutalistGrotesk.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --toolbar-bg: #f6f6f6;
            --border-color: #d1d1d1;
        }

        body {
            background: #222; /* Fallback color */
            background: url('4.png') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Common Window Styles */
        .window, .image-window {
            background: white;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: absolute;
            resize: both;
            overflow: hidden;
            /* Removed translate transform to prevent jumping during drag */
        }

        .window {
            width: 850px;
            height: 650px;
            top: 10%;
            left: 30%;
            z-index: 10;
        }

        .image-window {
            width: 600px;
            height: 400px;
            top: 20%;
            left: 10%;
            z-index: 5;
        }

        .title-bar {
            height: 35px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            padding: 0 12px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
        }

        .title-bar:active { cursor: grabbing; }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.1); }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .toolbar {
            height: 45px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
        }

        .tool-box {
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 13px;
        }

        #font-size-input {
            border: none;
            width: 60px;
            outline: none;
            font-size: 13px;
        }

        .canvas {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            outline: none;
            font-family: 'BrutalistGrotesk', sans-serif;
            line-height: 1.5;
            color: #000;
            white-space: pre-wrap;
        }

        .content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none; /* Prevents ghost image dragging */
        }
    </style>
</head>
<body>

<div class="image-window" id="imageWin">
    <div class="title-bar drag-handle">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <span style="margin-left: 10px; font-size: 12px; color: #666;">Image Preview</span>
    </div>
    <div class="content">
        <img src="5.png" alt="Preview Image">
    </div>
</div>

<div class="window" id="macWindow">
    <div class="title-bar drag-handle">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
    </div>
    
    <div class="toolbar">
        <div class="tool-box">Regular ▾</div>
        <div class="tool-box">
            <input type="text" id="font-size-input" value="72 pt">
        </div>
    </div>

    <div class="canvas" id="editor" contenteditable="true">bags books trueno
dead dog</div>
</div>

<script>
    const input = document.getElementById('font-size-input');
    const editor = document.getElementById('editor');

    // --- FONT SIZE LOGIC ---
    function updateFontSize() {
        const rawValue = input.value.replace(' pt', '').trim();
        if (!isNaN(rawValue) && rawValue !== "") {
            editor.style.fontSize = rawValue + 'pt';
        }
    }

    input.addEventListener('input', updateFontSize);
    input.addEventListener('blur', () => {
        if (!input.value.includes('pt')) input.value += ' pt';
    });
    window.addEventListener('load', updateFontSize);

    // --- REUSABLE DRAG LOGIC ---
    function makeDraggable(windowEl) {
        const handle = windowEl.querySelector('.drag-handle');
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

        handle.onmousedown = (e) => {
            e.preventDefault();
            // Bring clicked window to front
            document.querySelectorAll('.window, .image-window').forEach(w => w.style.zIndex = 5);
            windowEl.style.zIndex = 10;

            pos3 = e.clientX;
            pos4 = e.clientY;
            
            document.onmousemove = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                windowEl.style.top = (windowEl.offsetTop - pos2) + "px";
                windowEl.style.left = (windowEl.offsetLeft - pos1) + "px";
            };

            document.onmouseup = () => {
                document.onmousemove = null;
                document.onmouseup = null;
            };
        };
    }

    // Apply dragging to both windows
    makeDraggable(document.getElementById('macWindow'));
    makeDraggable(document.getElementById('imageWin'));
</script>

</body>
</html>
